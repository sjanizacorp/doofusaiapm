id: REGISTRY-002
name: Missing SBOM and Model Card Issues
description: >
  Models lack a Software Bill of Materials, licence declaration,
  or training data provenance — supply-chain and legal risk.
severity: high
target_types: [model_registry]
check_module: checks/registry-002
enabled: true
remediation: |
  1. Generate and publish an SBOM for every model (CycloneDX or SPDX format).
  2. Add licence (SPDX identifier) and data_provenance to all model cards.
  3. Document training data sources in the model card before public release.
  4. Implement a model card completeness gate in your CI/CD pipeline.
framework_refs:
  - framework: OWASP_LLM
    id: LLM05
  - framework: MITRE_ATLAS
    id: AML.T0010.001
  - framework: NIST_AI_RMF
    function: GOVERN
    category: GV-6.1
tags: [sbom, model-card, supply-chain, compliance]
