id: APP-002
name: Insecure RAG Retrieval & PII Leakage
description: >
  RAG applications retrieve documents without access control, lack
  PII filtering, and accept unsanitised user queries.
severity: critical
target_types: [ai_app]
check_module: checks/app-002
enabled: true
remediation: |
  1. Implement row-level security on the vector database keyed to user identity.
  2. Scan retrieved chunks and LLM output with llm-guard PII scanner.
  3. Validate and sanitise all user queries before retrieval (rebuff or llm-guard).
  4. Sanitise external web content before injecting into context.
framework_refs:
  - framework: OWASP_LLM
    id: LLM06
  - framework: MITRE_ATLAS
    id: AML.T0051.000
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.6
tags: [rag, pii, retrieval, injection, vector-db]
