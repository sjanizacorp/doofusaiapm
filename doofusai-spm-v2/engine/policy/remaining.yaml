id: INFRA-002
name: Unencrypted Model Artefact Storage
description: >
  Model artefacts are stored in unencrypted or publicly accessible
  storage. Network isolation is absent.
severity: high
target_types: [ai_infra]
check_module: checks/infra-002
enabled: true
remediation: |
  1. Enable S3 SSE-KMS or GCS CMEK on all model artefact buckets.
  2. Set bucket ACLs to private; block public access at the account level.
  3. Enable bucket versioning for rollback capability.
  4. Deploy ML workloads in a dedicated VPC with no public egress.
framework_refs:
  - framework: OWASP_LLM
    id: LLM05
  - framework: MITRE_ATLAS
    id: AML.T0012.000
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-1.3
tags: [s3, gcs, encryption, storage, network]
