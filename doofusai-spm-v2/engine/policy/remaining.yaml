id: REGISTRY-001
name: Unsigned Model Artefacts & Pickle Deserialisation Risk
description: >
  Models in the registry are unsigned or in pickle format, enabling
  supply-chain attacks and arbitrary code execution on load.
severity: critical
target_types: [model_registry]
check_module: checks/registry-001
enabled: true
remediation: |
  1. Enforce model signing with sigstore/cosign before registry admission.
  2. Store SHA-256 checksums for every artefact version; verify on load.
  3. Migrate from pickle to SafeTensors format for model weights.
  4. Implement a registry admission policy that rejects unsigned artefacts.
framework_refs:
  - framework: OWASP_LLM
    id: LLM05
  - framework: MITRE_ATLAS
    id: AML.T0010.000
  - framework: NIST_AI_RMF
    function: MAP
    category: MP-2.3
tags: [supply-chain, pickle, signing, rce-risk]
