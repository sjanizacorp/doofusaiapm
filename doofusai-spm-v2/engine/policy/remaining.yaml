id: APP-001
name: Excessive Agency — Overbroad Tool Scope
description: >
  LLM agents have access to high-risk tools without human-in-the-loop
  controls or recursion depth limits.
severity: critical
target_types: [ai_app]
check_module: checks/app-001
enabled: true
remediation: |
  1. Apply principle of least privilege — restrict agents to only required tools.
  2. Add HITL approval gates before any irreversible action (delete, pay, deploy).
  3. Set max_iterations to ≤10 for most agents; ≤20 for research agents.
  4. Log all tool calls with inputs/outputs for post-hoc audit.
framework_refs:
  - framework: OWASP_LLM
    id: LLM08
  - framework: MITRE_ATLAS
    id: AML.T0051.001
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-4.1
tags: [agent, excessive-agency, hitl, tool-use]
