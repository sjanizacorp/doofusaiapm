id: CICD-001
name: CI/CD Pipeline Security
description: >
  Insecure CI/CD pipelines allow supply chain attacks, secret exfiltration,
  and deployment of untested or malicious model artefacts.
severity: critical
target_types: [cicd_pipeline]
check_module: checks/cicd-001
enabled: true
remediation: |
  1. Enable branch protection with required PR reviews on all production branches.
  2. Enable GitHub Advanced Security secret scanning or equivalent.
  3. Pin all GitHub Actions to full 40-character commit SHAs.
  4. Remove privileged access from CI runners; use OIDC federated credentials.
  5. Add a model signing gate to the CD pipeline using sigstore/cosign.
  6. Achieve SLSA Level 2 minimum by using a hosted build service with provenance.
  7. Audit all workflows for pull_request_target trigger misuse.
framework_refs:
  - framework: OWASP_LLM
    id: LLM03
  - framework: MITRE_ATLAS
    id: AML.T0010.002
  - framework: NIST_AI_RMF
    function: GOVERN
    category: GV-6.1
tags: [cicd, pipeline, supply-chain, github-actions, slsa]
