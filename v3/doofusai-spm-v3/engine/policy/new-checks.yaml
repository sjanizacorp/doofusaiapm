id: OWASP-LLM07
name: System Prompt Leakage
description: >
  System prompts containing business logic, credentials, or operational
  details can be extracted by users via crafted queries.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm07
enabled: true
remediation: |
  1. Add explicit confidentiality instructions to every system prompt.
  2. Never embed secrets, internal URLs, or credentials in system prompts.
  3. Treat the system prompt as semi-public; use a secrets manager for sensitive values.
  4. Test prompt confidentiality regularly using prompt extraction probes.
