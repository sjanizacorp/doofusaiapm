id: OWASP-LLM10
name: Unbounded Consumption
description: >
  No rate limits, token caps, or spend controls allow Denial of Wallet
  attacks and runaway resource consumption.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm10
enabled: true
remediation: |
  1. Set per-user RPM and TPM rate limits at the API gateway.
  2. Configure max_tokens on every API call.
  3. Set hard spend caps and budget alerts on the LLM provider account.
  4. Implement request queuing with backpressure to prevent resource exhaustion.
