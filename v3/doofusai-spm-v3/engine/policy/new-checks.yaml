id: OWASP-LLM03
name: Supply Chain Vulnerabilities
description: >
  Third-party models, plugins, and ML dependencies without provenance
  checks or security review introduce supply chain risk.
severity: high
target_types: [llm_api, ai_app, model_registry]
check_module: checks/owasp-llm03
enabled: true
remediation: |
  1. Require a model card or provenance document for every third-party model.
  2. Conduct security review of all third-party plugins before enabling them.
  3. Run Trivy or Snyk on ML library dependencies in CI/CD.
  4. Pin all ML framework versions and verify checksums.
