id: ATLAS-001
name: Model Reconnaissance and Extraction
description: >
  Lack of query logging and anomaly detection enables adversaries to
  extract model functionality via systematic API probing (AML.T0040).
severity: high
target_types: [llm_api, model_registry]
check_module: checks/atlas-001
enabled: true
remediation: |
  1. Log all API queries with metadata (user, timestamp, input hash).
  2. Deploy anomaly detection on query patterns to flag systematic probing.
  3. Apply model watermarking to enable theft detection post-extraction.
  4. Consider output perturbation to degrade extraction attack accuracy.
framework_refs:
