id: OWASP-LLM09
name: Misinformation
description: >
  LLMs that hallucinate or produce false information without grounding
  or human review pose direct risk in high-stakes domains.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm09
enabled: true
remediation: |
  1. Implement RAG grounding to anchor responses in verified sources.
  2. Add structured output validation to catch factually impossible responses.
  3. Require human review before LLM outputs are used in medical, legal, or financial decisions.
  4. Display confidence indicators and source citations to end users.
