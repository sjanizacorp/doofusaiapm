id: OWASP-LLM05
name: Improper Output Handling
description: >
  LLM outputs rendered without sanitisation or validation can enable
  XSS, SSRF, code injection, or SQL injection downstream.
severity: critical
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm05
enabled: true
remediation: |
  1. Encode all LLM output before inserting into HTML, SQL, shell, or code contexts.
  2. Never execute LLM-generated code without sandboxing and human review.
  3. Validate output structure against a schema before passing to downstream systems.
  4. Use Content Security Policy (CSP) to limit damage from XSS payloads.
