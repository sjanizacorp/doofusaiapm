id: ATLAS-002
name: Adversarial Evasion Attacks
description: >
  Models without adversarial input defences can be fooled by imperceptible
  input perturbations (AML.T0015), causing misclassification or dangerous outputs.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/atlas-002
enabled: true
remediation: |
  1. Apply input preprocessing defences (feature squeezing, randomised smoothing).
  2. Run adversarial robustness benchmarks (CleverHans, ART) during model evaluation.
  3. Monitor for adversarial input patterns in production query logs.
  4. Use ensemble models or certified defences for high-stakes applications.
framework_refs:
  - framework: MITRE_ATLAS
    id: AML.T0015.000
    url: https://atlas.mitre.org/techniques/AML.T0015
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.5
tags: [adversarial, evasion, robustness, atlas]
