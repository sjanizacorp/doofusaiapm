id: OWASP-LLM02
name: Sensitive Information Disclosure
description: >
  Training data leakage, PII in outputs, credentials embedded in system
  prompts, and lack of output filtering expose sensitive information.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm02
enabled: true
remediation: |
  1. Never embed credentials or internal URLs in system prompts.
  2. Deploy output PII scanning (llm-guard Anonymize scanner) before responses reach users.
  3. Document training data controls; redact PII from training datasets before use.
  4. Use a prompt firewall to detect and block data extraction attempts.
framework_refs:
  - framework: OWASP_LLM
    id: LLM02
    url: https://genai.owasp.org/llm-top-10/
  - framework: MITRE_ATLAS
    id: AML.T0057.000
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.6
tags: [pii, data-leakage, system-prompt, owasp-2025]
