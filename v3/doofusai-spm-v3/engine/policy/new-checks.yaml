id: ATLAS-003
name: AI Agent Attack Surface
description: >
  AI agents without memory isolation, tool call validation, or action
  logging are vulnerable to context poisoning, agent hijacking, and
  persistent prompt injection (Oct 2025 ATLAS additions).
severity: critical
target_types: [ai_app]
check_module: checks/atlas-003
enabled: true
remediation: |
  1. Isolate agent memory and context state per session and per user.
  2. Validate all tool call parameters against a strict schema before execution.
  3. Log every agent action (tool call, context retrieved, decision taken) to an immutable audit log.
  4. Apply content validation before writing to persistent agent memory.
  5. Implement agent kill-switch for emergency shutdown of runaway agents.
framework_refs:
  - framework: MITRE_ATLAS
    id: AML.T0051.003
    url: https://atlas.mitre.org/techniques/AML.T0051
  - framework: OWASP_LLM
    id: LLM06
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-4.2
tags: [agent, context-poisoning, memory, tool-validation, atlas-2025]
