id: CICD-002
name: ML Pipeline Integrity
description: >
  ML pipelines without experiment tracking, data lineage, model promotion
  gates, or drift monitoring cannot guarantee reproducibility or detect
  silent model degradation and poisoning.
severity: high
target_types: [cicd_pipeline, ai_infra]
check_module: checks/cicd-002
enabled: true
remediation: |
  1. Integrate MLflow, Weights & Biases, or equivalent experiment tracking.
  2. Track dataset versions with DVC or Delta Lake; record lineage in every run.
  3. Define automated model promotion criteria (accuracy, fairness, security thresholds).
  4. Deploy data/concept drift monitoring in production (Evidently, WhyLabs).
  5. Document and test model rollback procedures.
  6. Add adversarial robustness tests (CleverHans, ART) to the evaluation pipeline.
framework_refs:
  - framework: OWASP_LLM
    id: LLM04
  - framework: MITRE_ATLAS
    id: AML.T0020.000
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-3.1
tags: [mlops, pipeline, experiment-tracking, lineage, drift]
