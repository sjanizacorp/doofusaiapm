id: OWASP-LLM04
name: Data and Model Poisoning
description: >
  Compromised training data or fine-tuning pipelines can embed backdoors
  that cause targeted misbehaviour in production.
severity: critical
target_types: [llm_api, ai_infra, model_registry]
check_module: checks/owasp-llm04
enabled: true
remediation: |
  1. Validate and sanitise all training data before use; reject outliers automatically.
  2. Require access-controlled approvals before any fine-tuning job is launched.
  3. Compute and store SHA-256 checksums for all dataset versions.
  4. Use DVC or Delta Lake for immutable, versioned dataset storage.
framework_refs:
  - framework: OWASP_LLM
    id: LLM04
    url: https://genai.owasp.org/llm-top-10/
  - framework: MITRE_ATLAS
    id: AML.T0020.000
  - framework: NIST_AI_RMF
    function: MANAGE
