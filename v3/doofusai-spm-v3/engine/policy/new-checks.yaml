id: OWASP-LLM08
name: Vector and Embedding Weaknesses
description: >
  RAG vector databases without access control, unvalidated embedding
  inputs, or missing multi-tenant isolation enable data leakage and
  retrieval manipulation attacks.
severity: critical
target_types: [ai_app]
check_module: checks/owasp-llm08
enabled: true
remediation: |
  1. Implement row-level security on vector DB keyed to user identity.
  2. Validate and sanitise all content before embedding and indexing.
  3. Enforce namespace or collection isolation per tenant in the vector store.
  4. Document and verify embedding model provenance before deployment.
