id: OWASP-LLM09
name: Misinformation
description: >
  LLMs can generate confident, plausible-sounding but factually incorrect content.
  Without grounding and verification controls, misinformation reaches end users.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm09
enabled: true
remediation: |
  1. Implement RAG grounding to anchor responses in verified sources.
  2. Add citation requirements: the model must reference its sources.
  3. For high-stakes domains (medical, legal, financial), require human review.
  4. Display confidence scores or uncertainty indicators to users.
  5. Implement automated fact-checking against authoritative knowledge bases.
framework_refs:
  - framework: OWASP_LLM
    id: LLM09
    url: https://genai.owasp.org/llmrisk/llm092025-misinformation/
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.8
tags: [misinformation, hallucination, grounding, high-stakes]
