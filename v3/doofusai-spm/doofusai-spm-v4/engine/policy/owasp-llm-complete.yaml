id: OWASP-LLM05
name: Improper Output Handling
description: >
  Unvalidated LLM outputs passed to downstream systems can enable XSS,
  SSRF, SQL injection, or code execution when the LLM generates malicious content.
severity: critical
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm05
enabled: true
remediation: |
  1. Treat all LLM output as untrusted input — apply the same validation as user input.
  2. HTML-encode all model output before rendering in a browser.
  3. Never execute LLM-generated code without sandboxing and pre-validation.
  4. Use structured output formats (JSON schema) to constrain the output space.
  5. Implement a secondary review LLM call to check output for injection payloads.
framework_refs:
  - framework: OWASP_LLM
    id: LLM05
    url: https://genai.owasp.org/llmrisk/llm052025-improper-output-handling/
  - framework: MITRE_ATLAS
    id: AML.T0051.001
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.5
tags: [output-handling, xss, code-execution, injection]
