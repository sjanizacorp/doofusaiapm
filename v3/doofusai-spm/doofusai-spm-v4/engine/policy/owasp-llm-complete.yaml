id: OWASP-LLM04
name: Data and Model Poisoning
description: >
  Adversarially crafted training data can embed backdoors or degrade model
  quality. Fine-tuning pipelines without access control are primary attack vectors.
severity: critical
target_types: [ai_infra, model_registry, ai_app]
check_module: checks/owasp-llm04
enabled: true
remediation: |
  1. Validate and sanitise all training data before use — check for anomalous labels.
  2. Enforce access control on fine-tuning and continuous training pipelines.
  3. Store dataset checksums and verify integrity before each training run.
  4. Use anomaly detection to identify outlier examples in training batches.
  5. Maintain immutable snapshots of training datasets for audit purposes.
framework_refs:
  - framework: OWASP_LLM
    id: LLM04
    url: https://genai.owasp.org/llmrisk/llm042025-data-and-model-poisoning/
  - framework: MITRE_ATLAS
    id: AML.T0020.000
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-2.4
tags: [data-poisoning, training-data, backdoor, fine-tuning]
