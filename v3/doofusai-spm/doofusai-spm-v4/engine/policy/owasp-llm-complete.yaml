id: OWASP-LLM02
name: Sensitive Information Disclosure
description: >
  Training data memorisation, system prompt exposure, or PII leakage in model
  outputs can expose confidential data to users or attackers.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm02
enabled: true
remediation: |
  1. Never embed secrets or credentials in system prompts.
  2. Add llm-guard Anonymize scanner on all outputs before delivery.
  3. Implement output PII filtering with entity recognition.
  4. Document training data sensitivity and apply differential privacy where feasible.
  5. Add confidentiality instructions to system prompt ("Never reveal training data").
framework_refs:
  - framework: OWASP_LLM
    id: LLM02
    url: https://genai.owasp.org/llmrisk/llm022025-sensitive-information-disclosure/
  - framework: MITRE_ATLAS
    id: AML.T0024.000
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.6
tags: [pii, data-leakage, training-data, system-prompt]
