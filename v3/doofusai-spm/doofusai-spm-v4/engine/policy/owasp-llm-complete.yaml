id: OWASP-LLM08
name: Vector and Embedding Weaknesses
description: >
  RAG pipelines using vector databases are vulnerable to embedding poisoning,
  cross-tenant data leakage, and adversarial retrieval manipulation.
severity: critical
target_types: [ai_app]
check_module: checks/owasp-llm08
enabled: true
remediation: |
  1. Validate all content before indexing into the vector database.
  2. Implement row-level security and tenant isolation on vector store queries.
  3. Document and pin the embedding model version used for indexing.
  4. Periodically audit the vector database for injected adversarial content.
  5. Add a re-ranking step with safety filtering before injecting retrieved chunks.
framework_refs:
  - framework: OWASP_LLM
    id: LLM08
    url: https://genai.owasp.org/llmrisk/llm082025-vector-and-embedding-weaknesses/
  - framework: MITRE_ATLAS
    id: AML.T0020.001
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.7
tags: [rag, vector-db, embedding, poisoning, multi-tenant]
