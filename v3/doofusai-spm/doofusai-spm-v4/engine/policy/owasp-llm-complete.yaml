id: OWASP-LLM10
name: Unbounded Consumption
description: >
  Unrestricted LLM resource usage enables Denial of Wallet attacks, service
  disruption, and unauthorised model replication through excessive querying.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/owasp-llm10
enabled: true
remediation: |
  1. Set per-user and per-application rate limits (RPM and TPM) on the API gateway.
  2. Configure max_tokens per request to cap completion length.
  3. Enable spend caps and billing alerts on all LLM provider accounts.
  4. Implement per-session token budgets and warn users when nearing limits.
  5. Monitor for anomalous usage patterns indicative of automated scraping.
framework_refs:
  - framework: OWASP_LLM
    id: LLM10
    url: https://genai.owasp.org/llmrisk/llm102025-unbounded-consumption/
  - framework: MITRE_ATLAS
    id: AML.T0034.000
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-4.2
tags: [rate-limiting, denial-of-wallet, cost, resource-exhaustion]
