id: OWASP-LLM03
name: Supply Chain Vulnerabilities
description: >
  Third-party model components, pre-trained weights, plugins, or ML libraries
  without provenance verification expose the application to supply chain attacks.
severity: high
target_types: [llm_api, model_registry, ai_app]
check_module: checks/owasp-llm03
enabled: true
remediation: |
  1. Document model provenance — base model, fine-tuning dataset, training code version.
  2. Conduct security review of all third-party plugins before deployment.
  3. Run trivy or grype on all ML container images and Python dependencies.
  4. Pin all ML framework versions and verify checksums.
  5. Use SLSA level 2+ for your model build pipeline.
framework_refs:
  - framework: OWASP_LLM
    id: LLM03
    url: https://genai.owasp.org/llmrisk/llm032025-supply-chain/
  - framework: MITRE_ATLAS
    id: AML.T0010.000
  - framework: NIST_AI_RMF
    function: MAP
    category: MP-2.3
tags: [supply-chain, plugins, dependencies, provenance]
