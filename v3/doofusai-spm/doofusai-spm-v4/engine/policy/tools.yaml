id: TOOL-LLM-GUARD
name: Unsafe input/output content (llm-guard)
description: >
  llm-guard scanners detected prompt injection, PII, banned topics,
  or toxic content in the application's sample prompts or outputs.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/tool-llm-guard
enabled: true
remediation: |
  1. Integrate llm-guard as an input scanner before every LLM call.
  2. Integrate llm-guard as an output scanner before returning to the user.
  3. For PII detections, anonymise inputs and de-anonymise outputs.
  4. For injection detections, add a rebuff pre-check.
  5. Tune scanner thresholds to reduce false positives in production.
framework_refs:
  - framework: OWASP_LLM
    id: LLM01
  - framework: OWASP_LLM
    id: LLM06
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.6
tags: [llm-guard, pii, injection, toxicity]
