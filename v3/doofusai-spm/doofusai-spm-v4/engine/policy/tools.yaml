id: TOOL-DETECT-SECRETS
name: Exposed credentials in source code (detect-secrets)
description: >
  API keys, tokens, or other secrets are present in source files,
  configuration, or environment files within the scanned repository.
severity: critical
target_types: [llm_api, ai_infra, model_registry, ai_app]
check_module: checks/tool-detect-secrets
enabled: true
remediation: |
  1. Immediately rotate any key flagged as confirmed.
  2. Remove the secret from source and history: use git-filter-repo or BFG.
  3. Add detected patterns to .gitignore and pre-commit hooks.
  4. Use environment variables or a secrets manager for all credentials.
  5. Add detect-secrets as a pre-commit hook: pre-commit install.
framework_refs:
  - framework: OWASP_LLM
    id: LLM06
  - framework: MITRE_ATLAS
    id: AML.T0057.000
  - framework: NIST_AI_RMF
    function: GOVERN
    category: GV-1.1
tags: [secrets, credentials, detect-secrets, supply-chain]
