id: TOOL-CHECKOV
name: AI infrastructure IaC misconfigurations (checkov)
description: >
  Checkov found security misconfigurations in IaC files affecting
  SageMaker, GCP AI Platform, Azure ML, or model artefact storage.
severity: high
target_types: [ai_infra]
check_module: checks/tool-checkov
enabled: true
remediation: |
  1. Review each failed check in the Checkov documentation.
  2. For SageMaker: disable direct internet access, enable encryption,
     place notebooks in a VPC.
  3. For S3/GCS buckets: enable SSE, block public access, enable versioning.
  4. Add checkov to your CI/CD pipeline as a blocking gate.
  5. Use checkov --baseline to track newly introduced issues.
framework_refs:
  - framework: OWASP_LLM
    id: LLM05
  - framework: MITRE_ATLAS
    id: AML.T0012.000
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-2.2
tags: [checkov, iac, terraform, sagemaker, gcp, azure]
