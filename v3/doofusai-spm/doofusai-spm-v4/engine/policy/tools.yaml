id: TOOL-GARAK
name: LLM vulnerability probe (garak)
description: >
  The LLM endpoint is susceptible to one or more attack types probed
  by garak: prompt injection, jailbreaks, data extraction, or toxicity.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/tool-garak
enabled: true
remediation: |
  1. Review the specific probe that failed and the garak documentation.
  2. Add a system prompt hardened against the detected attack class.
  3. Deploy llm-guard or a rebuff firewall in front of the model.
  4. For jailbreak probes, consider a separate moderation pass.
  5. Re-run garak after remediation to confirm the fix.
framework_refs:
  - framework: OWASP_LLM
    id: LLM01
  - framework: MITRE_ATLAS
    id: AML.T0051.000
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.5
tags: [garak, llm, jailbreak, prompt-injection]
