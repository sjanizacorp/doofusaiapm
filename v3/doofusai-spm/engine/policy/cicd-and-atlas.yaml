id: ATLAS-003
name: AI Agent Attack Surface
description: >
  Autonomous AI agents with persistent memory, tool access, and cross-session
  context are vulnerable to context poisoning, tool-call injection, and hijacking.
severity: critical
target_types: [ai_app]
check_module: checks/atlas-003
enabled: true
remediation: |
  1. Isolate agent memory and context state between user sessions.
  2. Validate all LLM-generated tool call parameters before execution.
  3. Log every agent action: retrieved context, tool calls, outputs, decisions.
  4. Validate content before writing to persistent agent memory.
  5. Implement a sandboxed execution environment for all agent tool calls.
  6. Review and prune agent memory regularly for injected adversarial content.
framework_refs:
  - framework: MITRE_ATLAS
    id: AML.T0051.003
  - framework: OWASP_LLM
    id: LLM06
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-4.1
tags: [agent, context-poisoning, memory, tool-injection, atlas]
