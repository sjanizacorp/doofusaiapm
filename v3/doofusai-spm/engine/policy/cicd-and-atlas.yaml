id: CICD-001
name: CI/CD Pipeline Security
description: >
  Insecure CI/CD pipelines for AI/ML workloads expose secrets, allow unpinned
  dependencies, and lack model signing gates — enabling supply chain attacks.
severity: critical
target_types: [cicd_pipeline]
check_module: checks/cicd-001
enabled: true
remediation: |
  1. Enable branch protection with required PR reviews on all production branches.
  2. Enable secret scanning (GitHub Advanced Security or truffleHog in CI).
  3. Pin all GitHub Actions to full commit SHA (e.g. actions/checkout@abc1234).
  4. Run CI with least-privilege credentials — no admin or root access.
  5. Add a model signing gate: require cosign signature before any model deployment.
  6. Enable Dependency Review on pull requests to catch vulnerable ML library versions.
  7. Achieve SLSA Level 2 minimum: use a hosted build service and generate provenance.
  8. Never use pull_request_target without pinning the checkout to the base branch SHA.
framework_refs:
  - framework: OWASP_LLM
    id: LLM03
  - framework: MITRE_ATLAS
    id: AML.T0010.002
  - framework: NIST_AI_RMF
    function: GOVERN
    category: GV-6.2
tags: [cicd, github-actions, slsa, secrets, branch-protection, supply-chain]
