id: CICD-002
name: ML Pipeline Integrity
description: >
  ML training and serving pipelines without lineage tracking, promotion gates,
  or drift monitoring allow degraded or compromised models to reach production.
severity: high
target_types: [cicd_pipeline, ai_infra]
check_module: checks/cicd-002
enabled: true
remediation: |
  1. Integrate MLflow, W&B, or Neptune for experiment tracking on every training run.
  2. Track dataset versions with DVC or Delta Lake — record which dataset trained each model.
  3. Implement automated model promotion gates: performance thresholds + security scan.
  4. Set up data drift and concept drift monitoring with Evidently or Fiddler.
  5. Document and test the rollback procedure for every model deployed to production.
  6. Add adversarial robustness tests (using ART or SecML) to the evaluation pipeline.
framework_refs:
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-3.1
  - framework: MITRE_ATLAS
    id: AML.T0020.000
  - framework: OWASP_LLM
    id: LLM04
tags: [mlops, experiment-tracking, data-lineage, drift-monitoring, rollback]
