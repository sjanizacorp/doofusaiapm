id: ATLAS-001
name: Model Reconnaissance and Extraction
description: >
  Adversaries probe model APIs to extract intellectual property or map decision
  boundaries. Without query logging and anomaly detection, attacks are invisible.
severity: high
target_types: [llm_api, ai_app]
check_module: checks/atlas-001
enabled: true
remediation: |
  1. Enable comprehensive query logging — log all inputs, timestamps, and user IDs.
  2. Implement anomaly detection to flag systematic probing patterns (high query volume, similar inputs).
  3. Apply model watermarking using a tool such as AquaML or MarkLLM.
  4. Rate-limit API access by user and IP — make bulk extraction economically impractical.
  5. Limit output confidence scores or probabilities to reduce extraction signal.
framework_refs:
  - framework: MITRE_ATLAS
    id: AML.T0040.000
  - framework: MITRE_ATLAS
    id: AML.T0024.000
  - framework: NIST_AI_RMF
    function: MANAGE
    category: MG-2.5
tags: [model-theft, extraction, watermarking, query-logging, atlas]
