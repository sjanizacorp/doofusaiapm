id: ATLAS-002
name: Adversarial Evasion Attacks
description: >
  Imperceptible input perturbations can cause misclassification or unexpected
  model behaviour. Defences must be evaluated as part of the model lifecycle.
severity: high
target_types: [llm_api, ai_app, model_registry]
check_module: checks/atlas-002
enabled: true
remediation: |
  1. Add adversarial robustness evaluation to your model evaluation pipeline.
  2. Apply input preprocessing defences: input smoothing, feature squeezing.
  3. Use certified defences such as randomised smoothing for high-assurance models.
  4. Test with ART (IBM Adversarial Robustness Toolbox) before each production deployment.
  5. Monitor production inputs for perturbation signatures (high-frequency noise patterns).
framework_refs:
  - framework: MITRE_ATLAS
    id: AML.T0015.000
  - framework: NIST_AI_RMF
    function: MEASURE
    category: MS-2.9
tags: [adversarial, evasion, robustness, perturbation, atlas]
